version: "3.9"

services:
  db:
    image: postgres:16
    container_name: spider-postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: root
      POSTGRES_DB: spider
    ports:
      - "5432:5432"
    volumes:
      - spider_pgdata:/var/lib/postgresql/data

volumes:
  spider_pgdata:
