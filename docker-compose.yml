services:
  db:
    image: postgres:16
    container_name: spider-postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: root
      POSTGRES_DB: spider
    ports:
      - "5432:5432"
    volumes:
      - spider_pgdata:/var/lib/postgresql/data

  redis:
      image: redis:7-alpine
      container_name: spider-redis
      restart: always
      command: redis-server --appendonly yes --requirepass root
      ports:
        - "6379:6379"
      volumes:
        - spider_redisdata:/data

volumes:
  spider_pgdata:
  spider_redisdata:
