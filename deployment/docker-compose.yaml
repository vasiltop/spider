services:
  postgres:
    image: postgres:16-alpine
    container_name: spider-postgres
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB_NAME}
      POSTGRES_USER: ${POSTGRES_DB_USER}
      POSTGRES_PASSWORD: ${POSTGRES_DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U spider_admin -d spider_production"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - spider-net

  redis:
    image: redis:7-alpine
    container_name: spider-redis
    restart: always
    command: redis-server --requirepass ${REDIS_PASSWORD}
    networks:
      - spider-net
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"

  migrate:
    image: spider-api
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - DATABASE_URL=${DATABASE_URL}
    networks:
      - spider-net
    command: node dist/migrate.js

  api:
    image: spider-api
    build:
      context: ..
      dockerfile: ./deployment/Dockerfile.api
    restart: always
    environment:
      - NODE_ENV=${NODE_ENV}
      - PORT=${API_PORT}
      - API_VERSION=${API_VERSION}
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=${REDIS_URL}
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_started
    networks:
      - spider-net

  frontend:
    build:
      context: ..
      dockerfile: ./deployment/Dockerfile.web
      args:
        - VITE_API_URL=${VITE_API_URL}
    container_name: spider-frontend
    restart: always
    networks:
      - spider-net
    environment:
      - VITE_API_URL=${VITE_API_URL}
    depends_on:
      - api

  caddy:
    image: caddy:2-alpine
    container_name: spider-proxy
    restart: always
    ports:
      - "80:80"
      - "443:443"
    networks:
      - spider-net
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - frontend
      - api

volumes:
  postgres_data:
  redis_data:
  caddy_data:
  caddy_config:

networks:
  spider-net:
    driver: bridge
